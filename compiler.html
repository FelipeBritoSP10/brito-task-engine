<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>BRITO.TASKS | Engine Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Pyodide para Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <!-- TypeScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: sans-serif;
            height: 100vh;
        }

        #monaco-container {
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .terminal-scroll::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>

<body class="flex flex-col h-screen p-2 sm:p-6 gap-4">

    <header class="flex justify-between items-center bg-slate-800 p-3 sm:p-4 rounded-xl shadow-md">
        <div class="flex items-center gap-3">
            <a href="index.html"
                class="flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-lg transition active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
            </a>
            <h1 class="text-base sm:text-xl font-black text-blue-500 italic uppercase">Brito.Tasks</h1>
        </div>

        <div class="flex gap-2">
            <select id="lang-select"
                class="bg-slate-900 border border-slate-700 px-3 py-2 rounded-lg text-sm sm:text-base font-bold text-blue-400 outline-none cursor-pointer">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="typescript">TypeScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="tailwind">Tailwind CSS</option>
            </select>
            <button id="run-btn"
                class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-black uppercase text-[10px] tracking-widest transition-all active:scale-95">
                Executar
            </button>
        </div>
    </header>

    <main class="flex flex-col lg:grid lg:grid-cols-2 gap-3 flex-1 overflow-hidden">
        <div id="monaco-container" class="rounded-xl shadow-lg border border-slate-700 flex-1">
        </div>

        <div class="flex flex-col gap-3 mt-3 lg:mt-0">
            <div id="preview-container" class="hidden bg-white rounded-xl shadow-lg flex-1 overflow-hidden">
                <iframe id="preview-iframe" class="w-full h-full border-none"></iframe>
            </div>
            <div
                class="bg-slate-900 rounded-xl border border-slate-700 p-3 font-mono text-base text-green-400 overflow-y-auto flex-1 shadow-inner terminal-scroll">
                <div id="terminal">» Engine Brito pronta. Selecione uma linguagem.</div>
            </div>
        </div>
    </main>

    <script src="src/js/compiler.js"></script>

</body>
</html>
